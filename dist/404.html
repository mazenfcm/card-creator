<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Mobile Card Creator</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Store the redirect path in sessionStorage
    const path = location.pathname;
    if (path !== '/card-creator/404.html') {
      sessionStorage.redirect = path;
      location.replace('/card-creator/');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
